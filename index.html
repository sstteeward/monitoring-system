<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIL Monitoring System</title>
  <script>
    // Apply theme before React mounts to prevent flash of wrong theme
    (function () {
      try {
        var theme = 'dark';
        var authKeys = Object.keys(localStorage).filter(function(k) { return k.startsWith('sb-') && k.endsWith('-auth-token'); });
        if (authKeys.length > 0) {
          var authData = JSON.parse(localStorage.getItem(authKeys[0]));
          var userId = authData && authData.user ? authData.user.id : null;
          if (userId) {
            var userTheme = localStorage.getItem('cd-theme-' + userId);
            if (userTheme === 'light' || userTheme === 'dark') {
              theme = userTheme;
            }
          }
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
